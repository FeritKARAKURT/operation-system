# Bootloader Konfigürasyon Dosyası (bootloader.cfg)
# Kernel olmadan sadece bootloader'ı başlatıyoruz

# Kernel'in yeri (şu an için yok ama kernel eklemek için kullanılabilir)
KERNEL_FILE = "/boot/kernel.bin"

# Kernel parametreleri (şu an boş çünkü kernel yok)
KERNEL_PARAMS = ""

# EFI dosyasının yolu
EFI_FILE = "/EFI/BOOT/BOOTX64.EFI"

# Bootloader başlatma işlemi (kendi yazdığınız bootloader koduna göre özelleştirilir)
BOOT_ACTION = "efi_main"
